services:
  app:
    image: node:20-alpine # O Docker vai baixar essa imagem que já tem Node e NPM
    container_name: node
    restart: unless-stopped
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app  # Sincroniza a pasta do WSL com a pasta dentro do Docker
      - /usr/src/app/node_modules # Joga node modules na memória
      - /usr/src/app/node_modules/.prisma # ADICIONAR PARA O PRISMA FUNCIONAR
    build: .
    ports:
      - "3000:3000"
      - "9229:9229"
    networks:
      - app-network
    environment:
      - REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    # && npm run dev para rodar em desenvolvimento
    command: sh -c "npx prisma generate && npm run debug" 
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    networks:
      - app-network
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - app-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

networks:
  app-network:
    #river: bridge # rede interna (no mesmo docker-compose.yml)
    # Crie a rede antes: docker network create app-network
    external: true 

volumes:
  pgdata:
  redis_data: